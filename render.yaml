databases:
  - name: easy-recycle-db
    region: frankfurt
    databaseName: easy_recycle
    user: easy_recycle

services:
  - type: web
    name: easy-recycle-api
    runtime: python
    region: frankfurt
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: bash -lc "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: easy-recycle-db
          property: connectionString
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: API_DOCS_ENABLED
        value: "false"
      - key: RATE_LIMIT_ENABLED
        value: "true"
      - key: MAX_IMAGE_BYTES
        value: "5242880"
      - key: GUEST_JWT_SECRET
        generateValue: true
      - key: GUEST_TOKEN_TTL_SECONDS
        value: "900"
      - key: CORS_ALLOW_ORIGINS
        sync: false
      - key: AWS_REGION
        sync: false
      - key: S3_BUCKET_NAME
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: S3_PRESIGN_TTL_SECONDS
        value: "120"
      - key: OPENAI_API_KEY
        sync: false
